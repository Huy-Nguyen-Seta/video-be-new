services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ktvideo
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
    environment:
      NODE_ENV: production
      PORT: 4000
      RUN_MIGRATIONS: "true"
      ENABLE_VIEW_FLUSHER: "true"
      CORS_ORIGIN: http://localhost:5173
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/ktvideo?schema=public
      JWT_ACCESS_SECRET: my_jwt_access_secret
      JWT_ACCESS_TTL: 900s
      JWT_REFRESH_SECRET: my_jwt_refresh_secret
      JWT_REFRESH_TTL: 7d
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_USE_SSL: "false"
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: ktvideo
      MINIO_PUBLIC_URL: http://minio:9000/ktvideo
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:4000/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    command: ["node", "dist/main.js"]

  worker:
    build:
      context: .
    environment:
      NODE_ENV: production
      PORT: 4000
      RUN_MIGRATIONS: "true"
      ENABLE_VIEW_FLUSHER: "true"
      CORS_ORIGIN: http://localhost:5173
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/ktvideo?schema=public
      JWT_ACCESS_SECRET: my_jwt_access_secret
      JWT_ACCESS_TTL: 900s
      JWT_REFRESH_SECRET: my_jwt_refresh_secret
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_USE_SSL: "false"
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: ktvideo
      MINIO_PUBLIC_URL: http://localhost:9000
    depends_on:
      api:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["node", "dist/worker.js"]

volumes:
  postgres_data:
  redis_data:
  minio_data:
